# Maven - Multi-Stage Pipeline
trigger:
- main

pool:
  name: test

variables:
  JAVA_HOME: 'C:\java\jdk-17'
  JAVA_HOME_11_X64: 'C:\java\jdk-17'
  buildConfig: 'package'
  artifactName: 'java-drop'

stages:

# ─── STAGE 1: BUILD ───────────────────────────────────────
- stage: Build
  displayName: 'Build & Compile'
  jobs:
  - job: MavenBuild
    displayName: 'Maven Build'
    steps:
    - task: Maven@3
      displayName: 'Compile & Package'
      inputs:
        mavenPomFile: 'pom.xml'
        javaHomeOption: 'Path'
        jdkDirectory: 'C:\java\jdk-17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: false
        goals: 'compile'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish JAR artifact'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: $(artifactName)

# ─── STAGE 2: TEST ────────────────────────────────────────
- stage: Test
  displayName: 'Run Tests'
  dependsOn: Build
  jobs:
  - job: MavenTest
    displayName: 'Maven Test'
    steps:
    - task: Maven@3
      displayName: 'Run unit tests'
      inputs:
        mavenPomFile: 'pom.xml'
        javaHomeOption: 'Path'
        jdkDirectory: 'C:\java\jdk-17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'test'

# ─── STAGE 3: PACKAGE & DEPLOY ────────────────────────────
- stage: Deploy
  displayName: 'Package & Deploy'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: MavenPackage
    displayName: 'Package JAR'
    environment: 'dev'           # ← create this in Pipelines > Environments
    strategy:
      runOnce:
        deploy:
          steps:
          - task: Maven@3
            displayName: 'mvn package (final JAR)'
            inputs:
              mavenPomFile: 'pom.xml'
              javaHomeOption: 'Path'
              jdkDirectory: 'C:\java\jdk-17'
              jdkArchitectureOption: 'x64'
              publishJUnitResults: false
              goals: 'package -DskipTests'

          - task: CopyFiles@2
            displayName: 'Copy JAR to staging'
            inputs:
              contents: '**/target/*.jar'
              targetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish final artifact'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: $(artifactName)