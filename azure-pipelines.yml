trigger:
- main

pool:
  name: test

variables:
  JAVA_HOME: 'C:\java\jdk-17'
  JAVA_HOME_11_X64: 'C:\java\jdk-17'
  imageName: 'java-pipeline-demo'
  acrLoginServer: 'madhumurundiacr.azurecr.io'
  jfrogRegistry: 'madhump.jfrog.io'
  jfrogRepo: 'madhump-docker'
  imageTag: '$(Build.BuildId)'

stages:

- stage: Build
  displayName: 'Stage 1 - Build'
  jobs:
  - job: MavenBuild
    steps:
    - task: Maven@3
      displayName: 'Compile Java'
      inputs:
        mavenPomFile: 'pom.xml'
        javaHomeOption: 'Path'
        jdkDirectory: 'C:\java\jdk-17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: false
        goals: 'compile'

- stage: Test
  displayName: 'Stage 2 - Test'
  dependsOn: Build
  jobs:
  - job: MavenTest
    steps:
    - task: Maven@3
      displayName: 'Run unit tests'
      inputs:
        mavenPomFile: 'pom.xml'
        javaHomeOption: 'Path'
        jdkDirectory: 'C:\java\jdk-17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'test'

- stage: Package
  displayName: 'Stage 3 - Package'
  dependsOn: Test
  jobs:
  - deployment: MavenPackage
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: Maven@3
            displayName: 'Package WAR'
            inputs:
              mavenPomFile: 'pom.xml'
              javaHomeOption: 'Path'
              jdkDirectory: 'C:\java\jdk-17'
              jdkArchitectureOption: 'x64'
              publishJUnitResults: false
              goals: 'package -DskipTests'
          - task: PublishBuildArtifacts@1
            displayName: 'Publish WAR'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'java-drop'

- stage: DockerBuild
  displayName: 'Stage 4 - Docker Build + ACR'
  dependsOn: Package
  condition: succeeded()
  jobs:
  - job: Docker
    steps:
    - task: Docker@2
      displayName: 'Build and push to ACR'
      inputs:
        command: 'buildAndPush'
        dockerfile: 'Dockerfile'
        containerRegistry: 'acr-connection'
        repository: '$(imageName)'
        tags: |
          $(imageTag)
          latest

- stage: PushToJFrog
  displayName: 'Stage 5 - Push to JFrog'
  dependsOn: DockerBuild
  condition: succeeded()
  jobs:
  - job: JFrogPush
    steps:
    - script: |
        docker login $(jfrogRegistry) -u $(JFROG_USER) -p $(JFROG_PASSWORD)
        docker tag $(acrLoginServer)/$(imageName):latest $(jfrogRegistry)/$(jfrogRepo)/$(imageName):$(imageTag)
        docker push $(jfrogRegistry)/$(jfrogRepo)/$(imageName):$(imageTag)
      displayName: 'Push to JFrog Artifactory'
