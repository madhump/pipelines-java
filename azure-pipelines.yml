# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

pool:
  name: test

variables:
  JAVA_HOME: 'C:\Users\Madhu Murundi\AnypointCodeBuilder\java\jdk-17.0.13+11'
  JAVA_HOME_11_X64: 'C:\Users\Madhu Murundi\AnypointCodeBuilder\java\jdk-17.0.13+11'
  PATH: '$(JAVA_HOME)\bin;C:\maven\apache-maven-3.9.14\bin;$(PATH)'

steps:
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    javaHomeOption: 'Path'
    jdkDirectory: 'C:\Users\Madhu Murundi\AnypointCodeBuilder\java\jdk-17.0.13+11'
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: 'package'